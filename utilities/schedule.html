<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MongoDB Mastering — Course Timings</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/theme/white.min.css">

    <style>
        /* Slide content lives in schedule.md (loaded below). This file is only
           the reveal.js + theme wrapper. Edit schedule.md to change content;
           edit this <style> block to change look. */

        .reveal { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .reveal h1, .reveal h2 { color: #2C5F41; text-transform: none; }
        .reveal .slides > section { overflow-y: auto; max-height: 88vh; }

        .reveal table { margin: auto; border-collapse: collapse; font-size: 0.78em; }
        .reveal table th { background: #4A8B3B; color: white; padding: 0.4em 0.8em; }
        .reveal table td { padding: 0.3em 0.8em; border-bottom: 1px solid #ddd; }

        /* The Markdown source can't tag individual rows with classes, so we
           detect lab rows by their bolded label (**Lab N**) and tint them.
           CSS :has() is supported in Chrome / Edge / Safari / Firefox 2024+. */
        .reveal table tr:has(td strong) { background: #fff7f5; }

        /* Right-most column = duration. Bold-green for visual scan. */
        .reveal table td:last-child { font-weight: bold; color: #2C5F41; white-space: nowrap; }

        .reveal .progress { background: rgba(44,95,65,0.2); }
        .reveal .progress span { background: #4A8B3B; }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">

            <!-- All slide content sourced from schedule.md (loaded via fetch).
                 Slides split on `---` lines; vertical sub-slides on `--` lines.
                 NOTE: this file MUST be served over HTTP -- opening via
                 file:// triggers a browser security policy that blocks
                 fetch() of local files, producing a blank deck. From the
                 utilities/ directory, run:
                     python3 -m http.server 8000
                 then open  http://localhost:8000/schedule.html  -->
            <section data-markdown="schedule.md"
                     data-separator="\r?\n---\r?\n"
                     data-separator-vertical="\r?\n--\r?\n"
                     data-charset="utf-8">
            </section>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/plugin/markdown/markdown.min.js"></script>
    <script>
        Reveal.initialize({
            hash: true, controls: true, progress: true, center: true,
            transition: 'slide',
            plugins: [ RevealMarkdown ],
            width: 1280, height: 900, margin: 0.06,
            minScale: 0.2, maxScale: 1.5,
        });
    </script>
</body>
</html>
